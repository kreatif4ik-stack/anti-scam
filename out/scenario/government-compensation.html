ой выплате, но нужно оплатить «пошлину». Проверьте, распознаете ли вы эту схему.\",\"source\":\"По материалам мвд.рф и banki.ru\",\"steps\":[{\"id\":1,\"question\":\"Вам пришло сообщение о крупной компенсации от государства. Вы перешли по ссылке?\",\"options\":[{\"text\":\"Да, интересно же\",\"color\":\"red\"},{\"text\":\"Нет, удалил\",\"color\":\"green\"}],\"explain\":{\"red\":\"Сообщения о неожиданных компенсациях — классическая приманка. Государство не рассылает уведомления о выплатах через СМС.\",\"green\":\"Правильное решение. Любые государственные выплаты оформляются через Госуслуги, МФЦ или официальные ведомства, а не через ссылки в СМС.\"}},{\"id\":2,\"question\":\"На сайте нужно было оплатить «пошлину» для получения компенсации. Вы заплатили?\",\"options\":[{\"text\":\"Да, заплатил\",\"color\":\"red\"},{\"text\":\"Нет, это подозрительно\",\"color\":\"green\"}],\"explain\":{\"red\":\"Компенсации не требуют предоплаты. Любой платёж перед получением выплаты — 100% мошенничество. Вы только что отдали свои деньги.\",\"green\":\"Верно. Никакие госвыплаты не требуют «пошлин» и «комиссий» — налоги уже удержаны или выплата идёт полностью.\"}},{\"id\":3,\"question\":\"«Сотрудник» сказал, что компенсация заморожена и нужен ещё один платёж для «разморозки». Вы заплатили снова?\",\"options\":[{\"text\":\"Да, заплатил\",\"color\":\"red\"},{\"text\":\"Нет, понял обман\",\"color\":\"green\"}],\"explain\":{\"red\":\"Мошенники будут выманивать деньги снова и снова, придумывая новые причины. «Разморозка», «страховка», «налог» — всё это ложь.\",\"green\":\"Отлично. Как только вас просят доплатить — это стопроцентный признак обмана. Настоящие выплаты не требуют повторных платежей.\"}},{\"id\":4,\"question\":\"Вас попросили прислать фото паспорта для «верификации». Вы отправили?\",\"options\":[{\"text\":\"Да, отправил\",\"color\":\"red\"},{\"text\":\"Нет, отказался\",\"color\":\"green\"}],\"explain\":{\"red\":\"Фото паспорта — ценный актив для мошенников. С ним можно оформить микрозаймы, зарегистрировать фирмы-однодневки и совершать другие преступления.\",\"green\":\"Правильно. Паспортные данные нельзя отправлять незнакомцам. Для получения реальных госвыплат документы подаются лично или через проверенные порталы.\"}},{\"id\":5,\"question\":\"Вам сказали, что для ускорения выплаты нужно установить приложение. Вы установили?\",\"options\":[{\"text\":\"Да, установил\",\"color\":\"red\"},{\"text\":\"Нет, отказался\",\"color\":\"green\"}],\"explain\":{\"red\":\"Это приложение удалённого доступа. С его помощью мошенники получат полный доступ к вашему телефону, банку и контактам.\",\"green\":\"Отлично. Запомните: любая просьба установить приложение от незнакомца — красный флаг. Устанавливайте приложения только из официальных магазинов.\"}},{\"id\":6,\"question\":\"Вас попросили назвать код подтверждения из СМС. Вы назвали?\",\"options\":[{\"text\":\"Да, назвал\",\"color\":\"red\"},{\"text\":\"Нет, не назвал\",\"color\":\"green\"}],\"explain\":{\"red\":\"Код из СМС — последний рубеж защиты ваших денег. Называя его, вы открываете мошенникам доступ к своим счетам. Код нельзя сообщать никому.\",\"green\":\"Идеально. Вы прошли всю схему без потерь. Помните: коды из СМС, ПИН-коды и CVV нельзя называть никому и никогда. Даже сотрудникам банка.\"}}],\"verdicts\":[{\"minRed\":0,\"maxRed\":1,\"title\":\"Вас не обмануть\",\"text\":\"Вы распознали схему с самого начала. Обещание лёгких денег не сработало. Делитесь этим опытом с окружающими — чем больше людей знают, тем меньше жертв.\"},{\"minRed\":2,\"maxRed\":3,\"title\":\"Вы могли бы попасться\",\"text\":\"Вы прошли несколько шагов, поддавшись на уговоры. Мошенники давят на жадность и страх. Запомните: бесплатный сыр бывает только в мышеловке.\"},{\"minRed\":4,\"maxRed\":6,\"title\":\"Вы бы потеряли деньги и данные\",\"text\":\"Вы прошли почти все шаги жертвы. От фото паспорта до кода из СМС — мошенники получили бы всё. Будьте осторожны: государство никогда не просит предоплат.\"}]}}],null],null],null]},[n
