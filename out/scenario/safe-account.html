ть обман?\",\"source\":\"По материалам cbr.ru и mos.ru\",\"steps\":[{\"id\":1,\"question\":\"Вам пришло СМС от «банка» о подозрительном входе в личный кабинет. Вы перешли по ссылке из сообщения?\",\"options\":[{\"text\":\"Да, перешёл\",\"color\":\"red\"},{\"text\":\"Нет, проигнорировал\",\"color\":\"green\"}],\"explain\":{\"red\":\"Ссылки из подозрительных СМС ведут на фишинговые сайты. Всегда заходите в банк через официальное приложение или набирайте адрес вручную.\",\"green\":\"Правильно. Любые ссылки из СМС — риск. Лучше открыть приложение банка отдельно и проверить информацию там.\"}},{\"id\":2,\"question\":\"Сайт выглядел как настоящий, но URL отличался. Вы ввели свои логин и пароль?\",\"options\":[{\"text\":\"Да, ввёл\",\"color\":\"red\"},{\"text\":\"Нет, заметил подмену\",\"color\":\"green\"}],\"explain\":{\"red\":\"Фишинговые сайты копируют дизайн банков, но URL всегда отличается. Теперь мошенники имеют ваш логин и пароль.\",\"green\":\"Отлично. Проверка URL — важнейшая привычка. Банки используют защищённые протоколы и не рассылают ссылки в СМС.\"}},{\"id\":3,\"question\":\"Вам позвонил «сотрудник банка» и подтвердил подозрительную активность. Вы поверили?\",\"options\":[{\"text\":\"Да, поверил\",\"color\":\"red\"},{\"text\":\"Нет, перезвонил в банк сам\",\"color\":\"green\"}],\"explain\":{\"red\":\"Мошенники используют украденные данные, чтобы убедить вас. Звонок от «безопасника» — следующий этап атаки.\",\"green\":\"Главное правило безопасности: перезванивать в банк самостоятельно по номеру на карте. Только так вы убедитесь, что говорите с реальным сотрудником.\"}},{\"id\":4,\"question\":\"Он попросил назвать последние 4 цифры вашей карты «для верификации». Вы назвали?\",\"options\":[{\"text\":\"Да, назвал\",\"color\":\"red\"},{\"text\":\"Нет, не назвал\",\"color\":\"green\"}],\"explain\":{\"red\":\"Последние 4 цифры — часть полного номера карты. Этой информации достаточно для некоторых операций. Настоящий сотрудник никогда не спросит их.\",\"green\":\"Верно. Любые данные карты — в том числе частичные — нельзя сообщать по телефону, если вы не уверены в собеседнике на 100%.\"}},{\"id\":5,\"question\":\"Он сказал, что ваш счёт в опасности, и нужно срочно создать «безопасный счёт». Вы согласились?\",\"options\":[{\"text\":\"Да, согласился\",\"color\":\"red\"},{\"text\":\"Нет, понял обман\",\"color\":\"green\"}],\"explain\":{\"red\":\"Понятия «безопасный счёт» не существует. Это уловка, чтобы вы сами перевели деньги мошенникам. Ни один банк не предлагает таких услуг.\",\"green\":\"Прекрасно. Запомните: любые разговоры о «безопасных счетах» — стопроцентное мошенничество.\"}},{\"id\":6,\"question\":\"Он попросил перевести все деньги на «безопасный счёт». Вы перевели?\",\"options\":[{\"text\":\"Да, перевёл\",\"color\":\"red\"},{\"text\":\"Нет, не перевёл\",\"color\":\"green\"}],\"explain\":{\"red\":\"К сожалению, вы перевели деньги мошенникам. Обратитесь в банк и полицию немедленно. Шанс вернуть средства есть, если действовать быстро.\",\"green\":\"Вы прошли сценарий, не потеряв деньги. Поздравляем! Теперь вы знаете главное: безопасных счетов не бывает, а сотрудники банков не просят переводов.\"}}],\"verdicts\":[{\"minRed\":0,\"maxRed\":1,\"title\":\"Вы отлично защищены\",\"text\":\"Вы почти не попались ни на одну уловку. Ваша финансовая грамотность на высоте. Поделитесь этим сценарием с друзьями и родственниками.\"},{\"minRed\":2,\"maxRed\":3,\"title\":\"Есть над чем работать\",\"text\":\"Вы прошли несколько шагов в красной зоне. Мошенники используют психологическое давление и спешку. Запомните: ни один банк не просит переводить деньги.«Безопасный счёт» — это миф.\"},{\"minRed\":4,\"maxRed\":6,\"title\":\"Вы бы потеряли все деньги\",\"text\":\"К сожалению, вы прошли почти все шаги жертвы. Мошенники очень убедительны, но теперь вы знаете схему. Главное: всегда перезванивайте в банк сами.\"}]}}],null],null],null]},[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"scenario\",\"child
