u и gazprombank.ru\",\"steps\":[{\"id\":1,\"question\":\"Вам позвонили с незнакомого номера. Вы взяли трубку?\",\"options\":[{\"text\":\"Да, взял\",\"color\":\"red\"},{\"text\":\"Нет, сбросил\",\"color\":\"green\"}],\"explain\":{\"red\":\"Незнакомый номер — первый звоночек. Но мошенники умеют подменять номера на знакомые, поэтому даже опытные люди могут ошибиться.\",\"green\":\"Вы сбросили — и правильно. Однако помните: мошенники могут звонить с номеров, похожих на официальные, так что всегда перезванивайте сами.\"}},{\"id\":2,\"question\":\"Звонящий представился майором ФСБ Ивановым и назвал ваши паспортные данные. Вы поверили?\",\"options\":[{\"text\":\"Да, поверил\",\"color\":\"red\"},{\"text\":\"Нет, усомнился\",\"color\":\"green\"}],\"explain\":{\"red\":\"Паспортные данные часто утекают в сеть — это не доказательство. Сотрудники ФСБ не звонят гражданам по таким вопросам.\",\"green\":\"Правильно. Любые персональные данные можно найти в утечках, это не повод доверять незнакомцу.\"}},{\"id\":3,\"question\":\"Он сказал, что на ваше имя оформлен кредит, и предложил «помочь» следствию. Вы согласились сотрудничать?\",\"options\":[{\"text\":\"Да, согласился\",\"color\":\"red\"},{\"text\":\"Нет, отказался\",\"color\":\"green\"}],\"explain\":{\"red\":\"Никакой «помощи следствию» не существует. Это классический приём — втереться в доверие через «общее дело».\",\"green\":\"Отличная реакция. Настоящие сотрудники никогда не просят граждан участвовать в оперативных мероприятиях.\"}},{\"id\":4,\"question\":\"Он попросил установить приложение для удалённого доступа на ваш телефон. Вы согласились?\",\"options\":[{\"text\":\"Да, установил\",\"color\":\"red\"},{\"text\":\"Нет, отказался\",\"color\":\"green\"}],\"explain\":{\"red\":\"Приложения удалённого доступа дают мошенникам полный контроль над вашим телефоном и банком. Никогда не устанавливайте их по просьбе незнакомцев.\",\"green\":\"Верное решение. Удалённый доступ — это ключи к вашим счетам, фото, контактам и СМС.\"}},{\"id\":5,\"question\":\"Он попросил назвать код из СМС-сообщения. Вы назвали?\",\"options\":[{\"text\":\"Да, назвал\",\"color\":\"red\"},{\"text\":\"Нет, не назвал\",\"color\":\"green\"}],\"explain\":{\"red\":\"Код из СМС — это фактически подпись для операции. Называя его, вы даёте доступ к своим деньгам. Настоящие сотрудники никогда не просят коды.\",\"green\":\"Абсолютно верно. Код из СМС, CVV и ПИН-код — тайна, которую нельзя сообщать никому.\"}},{\"id\":6,\"question\":\"Он попросил перевести деньги на «безопасный счёт». Вы перевели?\",\"options\":[{\"text\":\"Да, перевёл\",\"color\":\"red\"},{\"text\":\"Нет, не перевёл\",\"color\":\"green\"}],\"explain\":{\"red\":\"«Безопасных счетов» не существует. Это деньги мошенников. ЦБ, ФСБ и МВД никогда не просят переводить деньги на «специальные счета».\",\"green\":\"Блестяще. Вы прошли всю схему, не попавшись. Помните: безопасных счетов не существует, кто бы вам ни звонил.\"}}],\"verdicts\":[{\"minRed\":0,\"maxRed\":1,\"title\":\"Вы почти неуязвимы\",\"text\":\"Вы прошли схему «Майор ФСБ», практически не поведясь. Вы отлично знаете основные признаки мошенничества. Поделитесь этой карточкой с близкими — им тоже важно быть начеку.\"},{\"minRed\":2,\"maxRed\":3,\"title\":\"Вы в зоне риска\",\"text\":\"Вы прошли половину шагов в красной зоне. В реальности вас могло спасти только чудо или случайный звонок в банк. Выучите главное правило: ФСБ и ЦБ никогда не звонят гражданам.\"},{\"minRed\":4,\"maxRed\":6,\"title\":\"Вы бы потеряли деньги\",\"text\":\"Вы прошли почти весь путь жертвы. Мошенники очень убедительны, но запомните: сотрудники ФСБ и банков никогда не просят коды, переводы или установку приложений. Будьте внимательны!\"}]}}],null],null],null]},[null,[\"$\",\"$L7\",null,{\"parallelRouterKey\":\"children\",\"segmentPath\":[\"children\",\"scenario\",\"children\",\"$8\",\"children\"],\"error\":\"$undefined\",\"errorStyles\":\"$undefined\",\"errorScripts\":\"$undefined\",\"template\":[\"$\",\"$L9\",null,{}],\"templateStyles\
